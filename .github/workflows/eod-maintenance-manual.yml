name: Run EOD Maintenance

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      run_date:
        description: Optional YYYY-MM-DD run date
        required: false
        type: string
      limit:
        description: Max actionable predictions to process
        required: true
        default: "500"
        type: string
      tickers:
        description: Optional comma-separated ticker override, e.g. AAPL,AMD
        required: false
        type: string
      load_prices:
        description: Load/cache EOD prices
        required: true
        default: true
        type: boolean
      mark_predictions:
        description: Mark open predictions
        required: true
        default: true
        type: boolean
      roll_forward:
        description: Run selected date forward through latest cached EOD date
        required: true
        default: false
        type: boolean
      dry_run:
        description: Run without Firestore writes
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: eod-maintenance-manual-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  run-maintenance:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      TARGET_ENVIRONMENT: ${{ inputs.environment }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      CLOUD_RUN_SERVICE_STAGING: ${{ vars.CLOUD_RUN_SERVICE_STAGING }}
      CLOUD_RUN_SERVICE_PRODUCTION: ${{ vars.CLOUD_RUN_SERVICE_PRODUCTION }}
      INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Resolve Cloud Run URL
        id: cloud-run
        run: |
          set -euo pipefail
          service="$CLOUD_RUN_SERVICE_PRODUCTION"
          if [[ "$TARGET_ENVIRONMENT" == "staging" ]]; then
            service="$CLOUD_RUN_SERVICE_STAGING"
          fi

          if [[ -z "$service" ]]; then
            echo "Cloud Run service name is not configured for $TARGET_ENVIRONMENT" >&2
            exit 1
          fi

          url="$(gcloud run services describe "$service" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --format='value(status.url)')"

          if [[ -z "$url" ]]; then
            echo "Unable to resolve Cloud Run URL for $service" >&2
            exit 1
          fi

          echo "service=$service" >> "$GITHUB_OUTPUT"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Run EOD maintenance
        env:
          CLOUD_RUN_URL: ${{ steps.cloud-run.outputs.url }}
          RUN_DATE: ${{ inputs.run_date }}
          LIMIT: ${{ inputs.limit }}
          TICKERS: ${{ inputs.tickers }}
          LOAD_PRICES: ${{ inputs.load_prices }}
          MARK_PREDICTIONS: ${{ inputs.mark_predictions }}
          ROLL_FORWARD: ${{ inputs.roll_forward }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          if [[ -z "$INTERNAL_API_TOKEN" ]]; then
            echo "INTERNAL_API_TOKEN secret is not configured" >&2
            exit 1
          fi
          if [[ "${#INTERNAL_API_TOKEN}" -gt 12 ]]; then
            token_preview="${INTERNAL_API_TOKEN:0:6}...${INTERNAL_API_TOKEN: -6}"
          else
            token_preview="$INTERNAL_API_TOKEN"
          fi
          token_sha256="$(printf '%s' "$INTERNAL_API_TOKEN" | sha256sum | cut -d' ' -f1)"
          echo "INTERNAL_API_TOKEN present: true"
          echo "INTERNAL_API_TOKEN length: ${#INTERNAL_API_TOKEN}"
          echo "INTERNAL_API_TOKEN preview: ${token_preview}"
          echo "INTERNAL_API_TOKEN sha256: ${token_sha256}"

          body="$(jq -n \
            --arg runDate "$RUN_DATE" \
            --arg tickers "$TICKERS" \
            --argjson limit "$LIMIT" \
            --argjson loadPrices "$LOAD_PRICES" \
            --argjson markPredictions "$MARK_PREDICTIONS" \
            --argjson rollForward "$ROLL_FORWARD" \
            --argjson dryRun "$DRY_RUN" \
            '{
              limit: $limit,
              loadPrices: $loadPrices,
              markPredictions: $markPredictions,
              rollForward: $rollForward,
              dryRun: $dryRun
            }
            + (if $runDate == "" then {} else { runDate: $runDate } end)
            + (if $tickers == "" then {} else { tickers: ($tickers | split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))) } end)')"

          echo "Calling ${CLOUD_RUN_URL}/api/internal/daily-eod-maintenance"
          echo "Request body: $body"

          response_file="$(mktemp)"
          status="$(curl --silent --show-error \
            --output "$response_file" \
            --write-out '%{http_code}' \
            --request POST \
            --header "Authorization: Bearer ${INTERNAL_API_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "$body" \
            "${CLOUD_RUN_URL}/api/internal/daily-eod-maintenance" || true)"

          cat "$response_file"
          echo

          if [[ "$status" -lt 200 || "$status" -ge 300 ]]; then
            echo "EOD maintenance failed with HTTP $status" >&2
            exit 1
          fi
