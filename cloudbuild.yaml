steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_IMAGE}
      - --build-arg
      - GIT_SHA=${_GIT_SHA}
      - --build-arg
      - NEXT_PUBLIC_APP_ENVIRONMENT=${_NEXT_PUBLIC_APP_ENVIRONMENT}
      - --build-arg
      - NEXT_PUBLIC_SITE_URL=${_NEXT_PUBLIC_SITE_URL}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_API_KEY=${_NEXT_PUBLIC_FIREBASE_API_KEY}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_NEXT_PUBLIC_FIREBASE_PROJECT_ID}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_APP_ID=${_NEXT_PUBLIC_FIREBASE_APP_ID}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_IMAGE}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_IMAGE}
      - --platform
      - managed
      - --region
      - ${_REGION}
      - --allow-unauthenticated
      - --set-env-vars
      - APP_ENVIRONMENT=${_APP_ENVIRONMENT},GIT_SHA=${_GIT_SHA},NEXT_PUBLIC_SITE_URL=${_NEXT_PUBLIC_SITE_URL},NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_NEXT_PUBLIC_FIREBASE_PROJECT_ID},TWELVE_DATA_API_KEY=${_TWELVE_DATA_API_KEY},TWELVE_DATA_API_URL=${_TWELVE_DATA_API_URL},INTERNAL_API_TOKEN=${_INTERNAL_API_TOKEN},AI_ANALYST_USER_ID=${_AI_ANALYST_USER_ID},OPENAI_API_KEY=${_OPENAI_API_KEY},OPENAI_MODEL=${_OPENAI_MODEL},ENABLE_PRO_FEATURES=${_ENABLE_PRO_FEATURES},ENABLE_BILLING=${_ENABLE_BILLING},PRO_BILLING_BYPASS=${_PRO_BILLING_BYPASS}

substitutions:
  _SERVICE_NAME: ifindata-web
  _REGION: us-central1
  _APP_ENVIRONMENT: staging
  _NEXT_PUBLIC_APP_ENVIRONMENT: staging
  _GIT_SHA: local
  _NEXT_PUBLIC_SITE_URL: ""
  _NEXT_PUBLIC_FIREBASE_API_KEY: ""
  _NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ""
  _NEXT_PUBLIC_FIREBASE_PROJECT_ID: ""
  _NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ""
  _NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ""
  _NEXT_PUBLIC_FIREBASE_APP_ID: ""
  _TWELVE_DATA_API_KEY: ""
  _TWELVE_DATA_API_URL: ""
  _INTERNAL_API_TOKEN: ""
  _AI_ANALYST_USER_ID: ""
  _OPENAI_API_KEY: ""
  _OPENAI_MODEL: gpt-5.4
  _ENABLE_PRO_FEATURES: ""
  _ENABLE_BILLING: ""
  _PRO_BILLING_BYPASS: ""
  _IMAGE: us-central1-docker.pkg.dev/PROJECT_ID/ifindata/ifindata-web:latest

images:
  - ${_IMAGE}
