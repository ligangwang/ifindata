name: Sync Ticker Catalog

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      country:
        description: Twelve Data country filter
        required: true
        default: United States
        type: string
      currency:
        description: Twelve Data currency filter
        required: true
        default: USD
        type: string
      types:
        description: Comma-separated Twelve Data type filter
        required: true
        default: Common Stock,ETF
        type: string
      limit:
        description: Optional max filtered tickers to process
        required: false
        type: string
      dry_run:
        description: Run without Firestore writes
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: ticker-sync-manual-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  sync-tickers:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      TARGET_ENVIRONMENT: ${{ inputs.environment }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      CLOUD_RUN_SERVICE_STAGING: ${{ vars.CLOUD_RUN_SERVICE_STAGING }}
      CLOUD_RUN_SERVICE_PRODUCTION: ${{ vars.CLOUD_RUN_SERVICE_PRODUCTION }}
      INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Resolve Cloud Run URL
        id: cloud-run
        run: |
          set -euo pipefail
          service="$CLOUD_RUN_SERVICE_PRODUCTION"
          if [[ "$TARGET_ENVIRONMENT" == "staging" ]]; then
            service="$CLOUD_RUN_SERVICE_STAGING"
          fi

          if [[ -z "$service" ]]; then
            echo "Cloud Run service name is not configured for $TARGET_ENVIRONMENT" >&2
            exit 1
          fi

          url="$(gcloud run services describe "$service" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --format='value(status.url)')"

          if [[ -z "$url" ]]; then
            echo "Unable to resolve Cloud Run URL for $service" >&2
            exit 1
          fi

          echo "service=$service" >> "$GITHUB_OUTPUT"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Sync ticker catalog
        env:
          CLOUD_RUN_URL: ${{ steps.cloud-run.outputs.url }}
          COUNTRY: ${{ inputs.country }}
          CURRENCY: ${{ inputs.currency }}
          TYPES: ${{ inputs.types }}
          LIMIT: ${{ inputs.limit }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          if [[ -z "$INTERNAL_API_TOKEN" ]]; then
            echo "INTERNAL_API_TOKEN secret is not configured" >&2
            exit 1
          fi

          body="$(jq -n \
            --arg country "$COUNTRY" \
            --arg currency "$CURRENCY" \
            --arg types "$TYPES" \
            --arg limit "$LIMIT" \
            --argjson dryRun "$DRY_RUN" \
            '{
              country: $country,
              currency: $currency,
              types: ($types | split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))),
              dryRun: $dryRun
            }
            + (if $limit == "" then {} else { limit: ($limit | tonumber) } end)')"

          echo "Calling ${CLOUD_RUN_URL}/api/internal/sync-tickers"
          echo "Request body: $body"

          response_file="$(mktemp)"
          status="$(curl --silent --show-error \
            --output "$response_file" \
            --write-out '%{http_code}' \
            --request POST \
            --header "Authorization: Bearer ${INTERNAL_API_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "$body" \
            "${CLOUD_RUN_URL}/api/internal/sync-tickers" || true)"

          cat "$response_file"
          echo

          if [[ "$status" -lt 200 || "$status" -ge 300 ]]; then
            echo "Ticker sync failed with HTTP $status" >&2
            exit 1
          fi
