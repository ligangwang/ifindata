<svg width="420" height="96" viewBox="0 0 420 96" xmlns="http://www.w3.org/2000/svg">
  <style>
    .you { fill: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; font-weight: 600; }
    .nalyst { fill: #28A745; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; font-weight: 600; }
  </style>

  <!-- Centered text -->
  <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-size="48">
    <tspan class="you">You</tspan><tspan class="nalyst">nalyst</tspan>
  </text>
</svg>